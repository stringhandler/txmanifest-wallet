name: Release

# Build the tx-manifest-wallet CLI for each platform and attach the archives to a
# GitHub Release whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p tx-manifest-wallet --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="tx-manifest-wallet"
          target="${{ matrix.target }}"
          tag="${{ github.ref_name }}"
          staging="${bin}-${tag}-${target}"
          mkdir "$staging"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "target/$target/release/$bin.exe" "$staging/"
          else
            cp "target/$target/release/$bin" "$staging/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "$staging.zip" "$staging" >/dev/null
            echo "ASSET=$staging.zip" >> "$GITHUB_ENV"
          else
            tar czf "$staging.tar.gz" "$staging"
            echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
